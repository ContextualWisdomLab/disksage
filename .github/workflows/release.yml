name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            bundles: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundles: |
              src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux system deps (tauri GTK + llama.cpp native)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev cmake clang libclang-dev

      - name: Install macOS build deps (cmake for llama.cpp; clang from Xcode)
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      # windows-latest images ship cmake + LLVM + MSVC; no extra install needed.

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - run: npm ci

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      # Builds the SvelteKit frontend (beforeBuildCommand) + the Rust app with the real
      # llama.cpp engine (CPU in M6; GPU backends are a follow-up) and produces the OS bundles.
      - name: Tauri build (with embedded LLM)
        run: npm run tauri -- build --features llm-engine

      # PR / manual: keep the bundles as inspectable artifacts, no release published.
      - name: Upload build artifacts (no publish)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: disksage-${{ matrix.os }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error

      # Tag push: publish/attach the bundles to a single GitHub Release (matrix-safe).
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: ${{ matrix.bundles }}
          generate_release_notes: true
          fail_on_unmatched_files: true
