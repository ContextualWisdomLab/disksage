name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # Minimal top-level (read); elevate only this job — it publishes the Release on tag.
    permissions:
      contents: write
    env:
      # llama.cpp's ggml uses std::filesystem (needs macOS 10.15+). macos-latest is arm64 → 11.0.
      # Ignored on Windows/Linux runners.
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            bundles: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundles: |
              src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux system deps (tauri GTK + llama.cpp native)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev cmake clang libclang-dev

      - name: Install macOS build deps (cmake for llama.cpp; clang from Xcode)
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      # windows-latest images ship cmake + LLVM + MSVC; no extra install needed.

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - run: npm ci

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      # Builds the SvelteKit frontend (beforeBuildCommand) + the Rust app with the real
      # llama.cpp engine (CPU in M6; GPU backends are a follow-up) and produces the OS bundles.
      - name: Tauri build (with embedded LLM)
        run: npm run tauri -- build --features llm-engine

      # PR / manual: keep the bundles as inspectable artifacts, no release published.
      - name: Upload build artifacts (no publish)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: disksage-${{ matrix.os }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error

      # Tag push: publish/attach the bundles to a single GitHub Release (matrix-safe).
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: ${{ matrix.bundles }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  # GPU-enabled build (CUDA + Vulkan, dynamic backends) for RUNTIME verification on real GPU
  # hardware. Uploads the raw app exe + ggml/cuda/vulkan shared libs (NOT an installer) so a
  # tester can run it directly and confirm GPU offload. Installer bundling of the libs is a
  # follow-up once the runtime path is verified. macOS Metal is already covered by the `build`
  # job (auto-enabled on Apple Silicon), so this is Windows + Linux only.
  gpu-build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 (VS 2022 / MSVC 14.4x): CUDA 12.6 rejects the newer MSVC on windows-latest
        # (VS 2026) via host_config.h "unsupported Microsoft Visual Studio version".
        # Windows drops Vulkan: llama.cpp's vulkan-shaders-gen nested build blows past the Windows
        # 260-char MAX_PATH ("C1083: Cannot open compiler generated file"). The tester's GPU is
        # NVIDIA (CUDA), so CUDA+CPU covers it; Windows Vulkan is a follow-up (needs a short build
        # path). Linux keeps CUDA+Vulkan (no MAX_PATH limit).
        include:
          - os: ubuntu-22.04
            features: "llm-engine,llama-cpp-2/cuda,llama-cpp-2/vulkan,llama-cpp-2/dynamic-backends"
          - os: windows-2022
            features: "llm-engine,llama-cpp-2/cuda,llama-cpp-2/dynamic-backends"
    runs-on: ${{ matrix.os }}
    env:
      # Target the tester's GPU (RTX 3050 Ti = Ampere, compute 8.6) to keep the CUDA compile
      # from building every arch. Best-effort — ignored if the build system doesn't read it.
      CMAKE_CUDA_ARCHITECTURES: "86"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux system deps (tauri GTK + llama.cpp native + Vulkan build)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev cmake clang libclang-dev glslang-tools

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76 # v0.2.35
        with:
          cuda: "12.6.0"
          method: "network"

      - name: Install Vulkan SDK
        if: matrix.os == 'ubuntu-22.04'
        uses: jakoch/install-vulkan-sdk-action@37effcfa045411f8bfbbda26df2fd1b3bf3436fa # v1.6.0
        with:
          version: "1.3.290.0"
          install_runtime: true
          cache: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: npm ci
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          key: gpu

      # Windows: the runner's Visual Studio (v18/2026) is newer than CUDA 12.6's VS integration,
      # so cmake's VS generator fails with "No CUDA toolset found". Switch to Ninja + activate the
      # MSVC env so nvcc uses cl.exe directly as the host compiler (no VS-integration files needed).
      - name: Setup MSVC dev environment (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Force Ninja generator (Windows)
        if: matrix.os == 'windows-2022'
        shell: bash
        run: echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"

      # CUDA is dynamically linked (NVIDIA ships no static cudart); dynamic-backends builds each
      # ggml backend as a separate shared lib loaded at runtime, so the app launches on machines
      # WITHOUT CUDA (Vulkan/CPU fallback) — the distributable design from spec §6.
      # --no-bundle: build the app binary + shared libs only, skip installer bundling (linuxdeploy
      # fails on the dynamic backend .so's, and verification needs just the raw exe + libs anyway).
      - name: "Tauri build (GPU: CUDA [+ Vulkan on Linux] + dynamic backends)"
        run: npm run tauri -- build --no-bundle --features "${{ matrix.features }}"

      # Diagnostic: learn WHERE the shared libs landed (first-attempt discovery).
      - name: List built shared libs (diagnostic)
        if: always()
        shell: bash
        run: |
          echo "== target/release top =="; ls -la src-tauri/target/release/ 2>/dev/null | head -40 || true
          echo "== ggml/llama/cuda/vulkan libs under target (backends land in out/backends) =="; find src-tauri/target -maxdepth 8 -iregex '.*\(ggml\|llama\|cudart\|vulkan\).*\.\(dll\|so\|dylib\)' 2>/dev/null | head -60 || true
          echo "== out/backends dirs =="; find src-tauri/target -type d -name backends 2>/dev/null | head || true
          echo "== CUDA runtime dll/so =="; find "${CUDA_PATH:-/usr/local/cuda}" -iname 'cudart*' 2>/dev/null | head || true

      # Best-effort stage: app exe + every ggml/llama/cuda/vulkan shared lib next to it, so the
      # tester can run the exe directly. Paths refined based on the diagnostic above.
      - name: Stage GPU run bundle
        if: always()
        shell: bash
        run: |
          mkdir -p gpu-run
          # app binary (Tauri output name follows productName/crate; grab both just in case)
          find src-tauri/target/release -maxdepth 1 -type f \( -name 'disksage' -o -name 'disksage.exe' -o -name 'DiskSage' -o -name 'DiskSage.exe' \) -exec cp {} gpu-run/ \; 2>/dev/null || true
          # all ggml/llama shared libs incl. dynamic backends (deep in build/.../out/backends) and
          # Linux SONAME-versioned .so.N files; copy symlinks + targets so the set is self-contained.
          find src-tauri/target -maxdepth 8 -iregex '.*\(ggml\|llama\).*\(\.dll\|\.so\|\.so\..*\)' -exec cp {} gpu-run/ \; 2>/dev/null || true
          # CUDA runtime libs ggml-cuda needs at load time (cudart + cuBLAS). nvcuda/vulkan-1 come
          # from the GPU driver / Vulkan runtime already on the tester's machine.
          for pat in 'cudart64_*.dll' 'cublas64_*.dll' 'cublasLt64_*.dll'; do
            find "${CUDA_PATH:-/usr/local/cuda}" -iname "$pat" -exec cp {} gpu-run/ \; 2>/dev/null || true
          done
          for pat in 'libcudart.so*' 'libcublas.so*' 'libcublasLt.so*'; do
            find "${CUDA_PATH:-/usr/local/cuda}" -iname "$pat" -exec cp -L {} gpu-run/ \; 2>/dev/null || true
          done
          echo "== staged =="; ls -la gpu-run/ || true

      - name: Upload GPU run bundle (for manual GPU verification)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: disksage-gpu-${{ matrix.os }}
          path: gpu-run/
          if-no-files-found: warn
